            --accent-color: #ff3366;
            --accent-hover: #ff6699;
            --card-bg: #111118;
            --border-color: #2a2a35;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--card-bg);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.2);
        }
        h1 {
            margin: 0;
            color: var(--accent-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 2.5rem;
        }
        .stats {
            color: #888;
            font-style: italic;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        .section {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            margin-bottom: 3rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        h2 {
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }
        .search-container {
            display: flex;
            gap: 15px;
            margin-top: 1.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #1a1a24;
            color: white;
            font-size: 1.2rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            padding: 15px 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
        #results {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #1a1a24;
            border-radius: 6px;
            font-size: 1.2rem;
            display: none;
            border-left: 4px solid var(--accent-color);
        }
        .match-row {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .match-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
    </style>
</head>

        // Display exact count to prove it loaded fully
        document.getElementById('wordCountDisplay').innerText = `Lexicon Active: ${lexicon.length} Total Registered Words`;

        function translateWord() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            
            if (input === "") {
                resultsDiv.style.display = "block";
                resultsDiv.innerHTML = "Bro, you have to type something.";
                return;
            }

            // Find all exact matches from both sides
            const matches = lexicon.filter(w => w.eng.toLowerCase() === input || w.ect.toLowerCase() === input);

            resultsDiv.style.display = "block";

            if (matches.length > 0) {
                let htmlOutput = "";
                matches.forEach(match => {
                    htmlOutput += `<div class="match-row">Ectopian: <strong style="color: white; font-size: 1.4rem;">${match.ect}</strong> = English: <span style="color: #bbb;">${match.eng}</span></div>`;
                });
                resultsDiv.innerHTML = htmlOutput;
            } else {
                // If no exact match, do a partial search
                const partials = lexicon.filter(w => w.eng.toLowerCase().includes(input) || w.ect.toLowerCase().includes(input));
                if (partials.length > 0) {
                    let htmlOutput = "<em>No exact match. Did you mean:</em><br><br>";
                    // Show up to top 5 partials to keep it clean
                    partials.slice(0, 5).forEach(match => {
                         htmlOutput += `<div class="match-row">Ectopian: <strong style="color: white;">${match.ect}</strong> = English: <span style="color: #bbb;">${match.eng}</span></div>`;
                    });
                    resultsDiv.innerHTML = htmlOutput;
                } else {
                    resultsDiv.innerHTML = `Word not found. Either you spelled it wrong, or Yami hasn't invented it yet.`;
                }
            }
        }

        // Allow pressing Enter to search
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                translateWord();
            }
        });
